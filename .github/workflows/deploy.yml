name: CD - Deploy AWS EC2

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail

            # Ruta del clon en EC2. Ajustar si el despliegue usa otra ubicación.
            PROJECT_PATH="${HOME}/contactcenter-ai"

            echo "Usando PROJECT_PATH=${PROJECT_PATH}"

            if [ ! -d "${PROJECT_PATH}" ]; then
              echo "ERROR: No existe el directorio del proyecto: ${PROJECT_PATH}"
              exit 1
            fi

            cd "${PROJECT_PATH}"

            if [ ! -d .git ]; then
              echo "ERROR: El directorio no es un repositorio Git: ${PROJECT_PATH}"
              exit 1
            fi

            if [ ! -f docker-compose.yml ]; then
              echo "ERROR: No se encontró docker-compose.yml en ${PROJECT_PATH}"
              exit 1
            fi

            if [ ! -f .env ]; then
              echo "ERROR: Falta el archivo .env de producción en ${PROJECT_PATH}"
              exit 1
            fi

            echo "Actualizando código desde origin/main..."
            git fetch origin
            git checkout main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: El archivo .env desapareció tras actualizar el código"
              exit 1
            fi

            echo "Validando docker compose..."
            docker compose config --quiet

            echo "Construyendo imágenes..."
            docker compose build

            echo "Levantando servicios..."
            docker compose up -d --remove-orphans

            echo "Esperando inicio de contenedores..."
            sleep 40

            echo "Estado de servicios:"
            docker compose ps

            echo "Verificando contenedores exited o unhealthy..."
            BAD_STATUS="$(docker compose ps | awk 'NR > 1 && tolower($0) ~ /(exited|unhealthy)/ { print }')"
            if [ -n "${BAD_STATUS}" ]; then
              echo "ERROR: Hay servicios en estado inválido:"
              echo "${BAD_STATUS}"
              docker compose ps
              exit 1
            fi

            API_PORT="$(grep -E '^[[:space:]]*API_PORT=' .env | tail -n 1 | cut -d= -f2- | tr -d ' \"\t\r' || true)"
            CHAT_API_PORT="$(grep -E '^[[:space:]]*CHAT_API_PORT=' .env | tail -n 1 | cut -d= -f2- | tr -d ' \"\t\r' || true)"
            API_PORT="${API_PORT:-8080}"
            CHAT_API_PORT="${CHAT_API_PORT:-8081}"

            echo "Comprobando health Core API en puerto ${API_PORT}..."
            curl -fsS --retry 12 --retry-delay 5 --retry-connrefused \
              "http://127.0.0.1:${API_PORT}/health" >/dev/null

            echo "Comprobando health Chat API en puerto ${CHAT_API_PORT}..."
            curl -fsS --retry 12 --retry-delay 5 --retry-connrefused \
              "http://127.0.0.1:${CHAT_API_PORT}/health" >/dev/null

            echo "Despliegue completado correctamente."
            docker compose ps
