name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  build-and-test:
    name: Restore, Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore src/backend/ContactCenterAI.sln

      - name: Build
        run: dotnet build src/backend/ContactCenterAI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/backend/ContactCenterAI.sln --configuration Release --no-build --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/contact-center-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/frontend/contact-center-web
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend/contact-center-web
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f deploy/docker/Dockerfile.api -t contactcenterai-api:ci .

      - name: Build Worker image
        run: docker build -f deploy/docker/Dockerfile.worker -t contactcenterai-worker:ci .

      - name: Build Web image
        run: docker build -f deploy/docker/Dockerfile.web -t contactcenterai-web:ci .
